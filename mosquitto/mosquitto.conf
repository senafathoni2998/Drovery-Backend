# LOCAL/dev broker — anonymous + plaintext, fine for the local stack + load test.
#
# FOR PRODUCTION: set `allow_anonymous false`, add a `password_file` with per-device
# credentials + topic ACLs (so a drone can only publish to its own telemetry/ack topics),
# and switch the listener to mqtts (8883) with TLS certs. The backend's MqttService reads
# MQTT_USERNAME / MQTT_PASSWORD and accepts an mqtts:// URL — no code change needed.
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
