apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drovery-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drovery-api
  minReplicas: 2
  maxReplicas: 20 # overlay patches per environment
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # react to traffic spikes immediately
      selectPolicy: Max
      policies:
        - { type: Pods, value: 4, periodSeconds: 15 }
        - { type: Percent, value: 100, periodSeconds: 15 }
    scaleDown:
      stabilizationWindowSeconds: 300 # avoid thrash on transient dips
      selectPolicy: Max
      policies:
        - { type: Percent, value: 50, periodSeconds: 60 }
# Requires metrics-server in-cluster (minikube addons enable metrics-server).
# Dropping the api's resources.requests.cpu disables this HPA (reports <unknown>).
