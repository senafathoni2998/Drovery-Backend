global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # API tier — HTTP histogram/counter, WS gauges, default node/process metrics.
  - job_name: drovery-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['api:3000']
        labels: { tier: api }

  # Worker tier — the BullMQ queue-depth gauge (the KEDA autoscaler signal) +
  # default node/process metrics, served on the standalone metrics port.
  - job_name: drovery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:9091']
        labels: { tier: worker }
