# Round-robin load balancer over the scaled `api` replicas (docker compose --scale api=N).
# Using a VARIABLE in proxy_pass forces nginx to re-resolve `api` via Docker's embedded DNS
# (127.0.0.11) per request, so it spreads across ALL replica A-records instead of caching
# one at startup. This is what lets `--scale api=N` actually distribute load.
worker_processes auto;
events {
  worker_connections 4096;
}
http {
  access_log off; # the API tier emits the per-request metrics; keep the LB lean under load.
  resolver 127.0.0.11 valid=5s ipv6=off;

  server {
    listen 80;
    location / {
      set $api "api:3000";
      proxy_pass http://$api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
